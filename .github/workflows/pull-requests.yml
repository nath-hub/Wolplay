name: Deploy Wolplay

on:
  push:
    branches:
      - backend_staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /var/www/wolplay

            # Récupérer les changements depuis le repo staging

            git fetch staging backend_staging
            git reset --hard staging/backend_staging


            # Installation et nettoyage
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache


            # git merge staging/backend_staging --allow-unrelated-histories
            # git push staging main:backend_staging --force
