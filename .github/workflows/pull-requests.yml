name: Deploy Wolplay

on:
  push:
    branches:
      - backend_staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /var/www/backend
            cd /var/www/backend || exit

            # Si le dossier est vide (pas encore de git), on clone
            if [ ! -d ".git" ]; then
              git clone https://github.com/Neihos/wolplay.git .
            fi

            # Récupérer les changements depuis le repo staging

            git fetch staging backend_staging
            git reset --hard staging/backend_staging


            # Installation et nettoyage
            composer install --no-dev --optimize-autoloader
            # Remplacez /usr/local/bin/composer par le chemin réel (tapez 'which composer' sur votre serveur pour le trouver)
            php8.2 /usr/local/bin/composer install --no-dev --optimize-autoloader

            # On essaie de trouver PHP dynamiquement
            export PHP_PATH=$(which php8.2 || which php)
            export COMPOSER_PATH=$(which composer || echo "/usr/local/bin/composer")

            $PHP_PATH $COMPOSER_PATH install --no-dev --optimize-autoloader

            # Artisan : Mise à jour de la base de données et cache
            $PHP_PATH artisan migrate --force
            $PHP_PATH artisan config:cache
            $PHP_PATH artisan route:cache
            $PHP_PATH artisan view:cache

            # Droits pour le stockage (essentiel pour les photos Wolplay)
            chmod -R 775 storage bootstrap/cache


            # git merge staging/backend_staging --allow-unrelated-histories
            # git push staging main:backend_staging --force
