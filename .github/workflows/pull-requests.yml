name: Deploy Wolplay

on:
  push:
    branches:
      - backend_staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /var/www/backend || exit

            # Initialisation Git avec Token pour bypass l'authentification
            if [ ! -d ".git" ]; then
              echo "🚀 Premier clonage avec Token..."
              # REMPLACE TOKEN par ton vrai token généré à l'étape 1
              git clone https://TOKEN@github.com/Neihos/wolplay.git .
            fi

            # On s'assure que l'URL utilise toujours le token pour les fetch futurs
            git remote set-url origin https://TOKEN@github.com/Neihos/wolplay.git

            # Mise à jour
            git fetch origin backend_staging
            git reset --hard origin/backend_staging

            # Installation
            composer install --no-dev --optimize-autoloader --no-interaction

            # Laravel
            if [ ! -f ".env" ]; then
              cp .env.example .env
              php artisan key:generate
            fi

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Permissions
            chmod -R 775 storage bootstrap/cache


            # git merge staging/backend_staging --allow-unrelated-histories
            # git push staging main:backend_staging --force
