name: Deploy Wolplay

on:
  push:
    branches:
      - backend_staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          timeout: 60s          # Augmenté à 60 secondes
          command_timeout: 20m  # Augmenté à 20 minutes
          script: |
            cd /var/www/backend || exit

            # 1. Configurer SSH pour reconnaître GitHub
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts

            # 2. Démarrer l'agent et charger la clé existante (automatique)
            eval $(ssh-agent -s)

            # On cherche n'importe quelle clé privée disponible dans .ssh
            if [ -f ~/.ssh/id_ed25519 ]; then
                ssh-add ~/.ssh/id_ed25519
            elif [ -f ~/.ssh/id_rsa ]; then
                ssh-add ~/.ssh/id_rsa
            else
                echo "❌ Erreur : Aucune clé SSH trouvée dans ~/.ssh/"
                exit 1
            fi

            # 3. Initialisation Git via SSH
            if [ ! -d ".git" ]; then
              echo "🚀 Premier clonage via SSH..."
              git clone git@github.com:Neihos/wolplay.git .
            fi

            # 4. Mise à jour
            git fetch origin backend_staging
            git reset --hard origin/backend_staging

            # 5. Installation & Laravel
            mkdir -p .tmp
            export TMPDIR=$(pwd)/.tmp

            # 6. Installation avec les droits forcés
            echo "📦 Installation des dépendances..."
            composer install --no-dev --optimize-autoloader --no-interaction

            if [ ! -f ".env" ]; then
              cp .env.example .env
              php artisan key:generate
            fi

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # 6. Permissions
            chmod -R 775 storage bootstrap/cache


            # git merge staging/backend_staging --allow-unrelated-histories
            # git push staging main:backend_staging --force
