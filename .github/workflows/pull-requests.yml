name: Sync to Main and Deploy

on:
  push:
    branches:
      - backend_staging

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔁 Sync vers le repo de destination (nath-hub)
      # Même si le repo est public, le TOKEN est requis pour le push
      - name: Push to Main repository
        env:
            MY_TOKEN: ${{ secrets.TOKEN }}
        run: |
          git config --global user.name "Wolplay CI Bot"
          git config --global user.email "ci@wolplay.com"

          # On injecte le token directement dans l'URL de manière sécurisée
          git remote add target https://x-access-token:${MY_TOKEN}@github.com/nath-hub/Wolplay.git

          # On pousse la branche locale backend_staging vers le main distant
          git push target backend_staging:main --force

      # 🚀 Déploiement serveur via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /var/www/wolplay || exit

            # Récupération du nouveau code sur le serveur
            git fetch origin main
            git reset --hard origin/main

            # Optimisations Laravel pour Wolplay
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force

            # On met en cache pour les performances (indispensable en prod)
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Si tu gères des images (comptes premium), on s'assure du lien symbolique
            php artisan storage:link --quiet
